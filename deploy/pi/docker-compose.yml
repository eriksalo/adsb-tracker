services:
  ultrafeeder:
    image: ghcr.io/sdr-enthusiasts/docker-adsb-ultrafeeder:latest_nohealthcheck
    container_name: ultrafeeder
    restart: unless-stopped
    privileged: true
    ports:
      - "8080:80"       # tar1090 web UI
      - "30003:30003"   # SBS output (for our custom app)
      - "30005:30005"   # Beast output
    devices:
      - /dev/bus/usb:/dev/bus/usb
    environment:
      # Station location
      - FEEDER_LAT=${FEEDER_LAT}
      - FEEDER_LONG=${FEEDER_LONG}
      - FEEDER_ALT_M=${FEEDER_ALT_M}
      - FEEDER_TZ=${FEEDER_TZ}

      # SDR config
      - READSB_DEVICE_TYPE=rtlsdr
      - READSB_GAIN=autogain

      # Network outputs
      - READSB_NET_SBS_OUTPUT=true

      # tar1090 settings
      - UPDATE_TAR1090=true
      - TAR1090_DEFAULTCENTERLAT=${FEEDER_LAT}
      - TAR1090_DEFAULTCENTERLON=${FEEDER_LONG}
      - TAR1090_MESSAGERATEITHPAGE=true
      - TAR1090_PAGETITLE=ADS-B Tracker

      # Feed to aggregator services (uncomment and add keys as needed)
      # --- RadarBox (free Business account $399/yr) ---
      # - ULTRAFEEDER_CONFIG=adsb,feed.radarbox.com,30005,beast_reduce_plus_out
      # - RADARBOX_SHARING_KEY=${RADARBOX_SHARING_KEY}

      # --- Flightradar24 (free Premium) ---
      # - ULTRAFEEDER_CONFIG=adsb,feed.flightradar24.com,30005,beast_reduce_plus_out
      # - FR24_SHARING_KEY=${FR24_SHARING_KEY}

      # --- FlightAware (free Enterprise) ---
      # - ULTRAFEEDER_CONFIG=adsb,piaware.flightaware.com,1200,beast_reduce_plus_out
      # - PIAWARE_FEEDER_ID=${PIAWARE_FEEDER_ID}

      # --- ADSB.fi (free, community) ---
      # - ULTRAFEEDER_CONFIG=adsb,feed.adsb.fi,30004,beast_reduce_plus_out

      # --- ADS-B Exchange ---
      # - ULTRAFEEDER_CONFIG=adsb,feed1.adsbexchange.com,30004,beast_reduce_plus_out

    volumes:
      - ultrafeeder-globe:/var/globe_history
      - ultrafeeder-graphs:/var/lib/collectd
      - ultrafeeder-cache:/var/cache/readsb
    tmpfs:
      - /run:exec,size=128m
      - /tmp:size=64m
      - /var/log:size=32m

  # Optional: custom web app (our Python tracker)
  # Connects to ultrafeeder's SBS output for additional features
  adsb-tracker:
    build:
      context: ../..
      dockerfile: deploy/pi/Dockerfile
    container_name: adsb-tracker
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      - DUMP1090_HOST=ultrafeeder
      - DUMP1090_SBS_PORT=30003
      - DUMP1090_BEAST_PORT=30005
      - WEB_HOST=0.0.0.0
      - WEB_PORT=8080
      - STATION_LAT=${FEEDER_LAT}
      - STATION_LON=${FEEDER_LONG}
      - AIRCRAFT_TTL_SECONDS=60
    depends_on:
      - ultrafeeder

volumes:
  ultrafeeder-globe:
  ultrafeeder-graphs:
  ultrafeeder-cache:
